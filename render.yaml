services:
  - type: web
    name: linkedin-scraper
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: PORT
        value: "10000"
      - key: SCRAPER_TIMEOUT
        value: "45"
      - key: MAX_RETRIES
        value: "3"
